<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PayPal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #ffffff; font-family: "PayPal Sans", "Helvetica Neue", Arial, sans-serif; }

        .bot-bubble { background-color: #E3F2FD; color: #003087; border-radius: 18px 18px 18px 4px; font-size: 15px; }
        .user-bubble { background-color: #0070ba; color: #ffffff; border-radius: 18px 18px 4px 18px; font-size: 15px; }
        .timestamp { font-size: 11px; color: #6c7378; margin-top: 4px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

        .shadow-input { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

        .verified-badge {
            background: linear-gradient(135deg, #0070ba 0%, #005ea6 100%);
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.25));
        }
        .verified-bar {
            background-color: #0070ba; color: white; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 12px;
            border-radius: 99px; display: flex; align-items: center; gap: 4px;
        }
        .badge-pulse { animation: shadow-pulse 2s infinite; }
        @keyframes shadow-pulse {
            0% { filter: drop-shadow(0 0 0px rgba(0,112,186,0.5)); }
            70% { filter: drop-shadow(0 0 6px rgba(0,112,186,0.3)); }
            100% { filter: drop-shadow(0 0 0px rgba(0,112,186,0)); }
        }

        .pp-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid #0070ba;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .typing-row { display: flex; align-items: flex-end; gap: 10px; }
        .typing-bubble { background: #f2f2f2; border-radius: 18px 18px 18px 4px; padding: 12px 16px; display: flex; align-items: center; gap: 4px; }
        .typing-dot { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,80%,100%{transform:translateY(0);opacity:0.5} 40%{transform:translateY(-6px);opacity:1} }

        .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 4px 4px; }
        .quick-reply-btn {
            border: 1.5px solid #0070ba; color: #0070ba; background: #fff;
            border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 600;
            cursor: pointer;
        }

        .name-modal { position: fixed; inset: 0; background: rgba(0,48,135,0.55); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .name-modal.hidden { display: none; }

        #image-preview-wrap { display: none; padding: 8px 16px 0; background: #fff; }
        #image-preview-wrap img { height: 56px; border-radius: 8px; border: 1.5px solid #e0e0e0; }
        .remove-preview { width: 18px; height: 18px; background: #cc0000; color: #fff; border-radius: 50%; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Name modal -->
    <div class="name-modal" id="nameModal">
        <div class="name-box">
            <div class="modal-logo mx-auto mb-4 w-14 h-14 rounded-full overflow-hidden border-2 border-[#0070ba]">
                <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Agent" class="w-full h-full object-cover">
            </div>
            <h2>PayPal Assistant</h2>
            <p>Enter your name to start a live support session</p>
            <input id="customerName" class="name-input w-full border border-gray-300 rounded-2xl px-5 py-4 text-base focus:border-[#0070ba]" type="text" placeholder="Your name">
            <button onclick="startCustomerChat()" class="start-btn w-full bg-[#003087] text-white font-bold py-4 rounded-2xl mt-4">Start Chat</button>
        </div>
    </div>

    <!-- Header -->
    <nav class="bg-white border-b px-4 py-3 flex items-center shadow-sm z-10">
        <button onclick="history.back()" class="text-gray-500 mr-3">←</button>
        <div class="flex-1 flex flex-col items-center">
            <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Agent" class="w-10 h-10 rounded-full border-[2.5px] border-[#0070ba] shadow-md">
            <div class="flex items-center gap-2 mt-1">
                <h1 class="font-bold text-[19px] text-[#2c2e2f]">PayPal Assistant</h1>
                <span class="verified-badge p-px badge-pulse">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.54-1.27.47-2.73-.2-3.9s-1.98-1.81-3.27-1.74c-.71-1.3-2.08-2.18-3.66-2.18s-2.95.88-3.66 2.18c-1.29-.07-2.6.57-3.27 1.74s-.74 2.63-.2 3.9c-1.3.71-2.18 2.08-2.18 3.66s.88 2.95 2.18 3.66c-.54 1.27-.47 2.73.2 3.9s1.98 1.81 3.27 1.74c.71 1.3 2.08 2.18 3.66 2.18s2.95-.88 3.66-2.18c1.29.07 2.6-.57 3.27-1.74s.74-2.63.2-3.9c1.3-.71 2.18-2.08 2.18-3.66zm-12.25 4.5l-4.25-4.25 1.41-1.41 2.84 2.83 6.17-6.17 1.41 1.41-7.58 7.59z"/></svg>
                </span>
            </div>
            <div class="verified-bar text-xs mt-px shadow-md">OFFICIAL VERIFIED ACCOUNT</div>
        </div>
    </nav>

    <!-- Messages -->
    <main id="chat-scroll" class="flex-1 overflow-y-auto p-5 space-y-5 bg-[#f8f9fa]">
        <div id="messages-list"></div>
    </main>

    <!-- Quick replies -->
    <div id="quick-replies-wrap" class="px-4 pt-2 pb-3 bg-white hidden">
        <div class="quick-replies">
            <button onclick="sendQuickReply('I have a payment issue')" class="quick-reply-btn">💳 Payment issue</button>
            <button onclick="sendQuickReply('Check my refund status')" class="quick-reply-btn">🔄 Refund status</button>
            <button onclick="sendQuickReply('My account is limited')" class="quick-reply-btn">🔒 Account limited</button>
            <button onclick="sendQuickReply('I can\'t log in')" class="quick-reply-btn">🔑 Can't log in</button>
        </div>
    </div>

    <!-- Image preview -->
    <div id="image-preview-wrap" class="px-4 bg-white">
        <div class="inline-flex items-start gap-2">
            <img id="preview-img" src="" alt="preview" class="h-14 rounded-lg border border-gray-300">
            <span onclick="removeImagePreview()" class="remove-preview">✕</span>
        </div>
    </div>

    <!-- Input bar -->
    <footer class="p-4 bg-white border-t">
        <div class="flex items-center bg-white border border-gray-300 rounded-full px-4 py-2 shadow-input">
            <input type="file" id="image-input" accept="image/*" class="hidden">
            <button onclick="document.getElementById('image-input').click()" class="text-gray-500 mr-3">📸</button>
            <input id="message-input" type="text" placeholder="Type a message..." class="flex-1 bg-transparent outline-none text-base">
            <button onclick="sendMessage()" class="text-[#0070ba] font-bold px-4">Send</button>
        </div>
    </footer>

    <script>
        let socket = null;
        let sessionId = null;

        // Sound notification
        const notificationSound = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');

        function startCustomerChat() {
            const name = document.getElementById('customerName').value.trim() || "Customer";
            document.getElementById('nameModal').classList.add('hidden');

            socket = io();
            socket.emit('register_customer', { name });

            socket.on('new_message', ({ message }) => {
                if (message.sender === 'support') {
                    // Play sound when admin replies
                    notificationSound.play().catch(() => {});

                    if (message.image) appendImage(message.image, false, message.timestamp);
                    else appendMessage(message.text, false, message.timestamp);
                }
            });
        }

        function appendMessage(text, isUser, ts = Date.now()) {
            const div = document.createElement('div');
            const time = new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            if (isUser) {
                div.className = 'flex justify-end';
                div.innerHTML = `<div class="max-w-[85%]"><div class="user-bubble p-4">${text}</div><div class="timestamp justify-end">${time}</div></div>`;
            } else {
                div.className = 'flex items-start gap-3';
                div.innerHTML = `
                    <img src="https://randomuser.me/api/portraits/women/44.jpg" class="pp-avatar">
                    <div class="max-w-[85%]">
                        <div class="bot-bubble p-4">${text}</div>
                        <div class="timestamp">
                            PayPal Assistant 
                            <span class="verified-badge p-px ml-1">
                                <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.54-1.27.47-2.73-.2-3.9s-1.98-1.81-3.27-1.74c-.71-1.3-2.08-2.18-3.66-2.18s-2.95.88-3.66 2.18c-1.29-.07-2.6.57-3.27 1.74s-.74 2.63-.2 3.9c-1.3.71-2.18 2.08-2.18 3.66s.88 2.95 2.18 3.66c-.54 1.27-.47 2.73.2 3.9s1.98 1.81 3.27 1.74c.71 1.3 2.08 2.18 3.66 2.18s2.95-.88 3.66-2.18c1.29.07 2.6-.57 3.27-1.74s.74-2.63.2-3.9c1.3-.71 2.18-2.08 2.18-3.66zm-12.25 4.5l-4.25-4.25 1.41-1.41 2.84 2.83 6.17-6.17 1.41 1.41-7.58 7.59z"/></svg>
                            </span>
                        </div>
                    </div>`;
            }
            document.getElementById('messages-list').appendChild(div);
            document.getElementById('messages-list').scrollTop = document.getElementById('messages-list').scrollHeight;
        }

        function appendImage(base64, isUser, ts = Date.now()) {
            const div = document.createElement('div');
            const time = new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if (isUser) {
                div.className = 'flex justify-end';
                div.innerHTML = `<div class="max-w-[85%]"><div class="user-bubble p-4"><img src="${base64}" class="rounded-2xl max-w-[220px]" onclick="window.open('${base64}','_blank')"></div><div class="timestamp justify-end">${time}</div></div>`;
            } else {
                div.className = 'flex items-start gap-3';
                div.innerHTML = `<img src="https://randomuser.me/api/portraits/women/44.jpg" class="pp-avatar"><div class="max-w-[85%]"><div class="bot-bubble p-4"><img src="${base64}" class="rounded-2xl max-w-[220px]" onclick="window.open('${base64}','_blank')"></div><div class="timestamp">PayPal Assistant <span class="verified-badge p-px"><svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.54-1.27.47-2.73-.2-3.9s-1.98-1.81-3.27-1.74c-.71-1.3-2.08-2.18-3.66-2.18s-2.95.88-3.66 2.18c-1.29-.07-2.6.57-3.27 1.74s-.74 2.63-.2 3.9c-1.3.71-2.18 2.08-2.18 3.66s.88 2.95 2.18 3.66c-.54 1.27-.47 2.73.2 3.9s1.98 1.81 3.27 1.74c.71 1.3 2.08 2.18 3.66 2.18s2.95-.88 3.66-2.18c1.29.07 2.6-.57 3.27-1.74s.74-2.63.2-3.9c1.3-.71 2.18-2.08 2.18-3.66zm-12.25 4.5l-4.25-4.25 1.41-1.41 2.84 2.83 6.17-6.17 1.41 1.41-7.58 7.59z"/></svg></span></div></div>`;
            }
            document.getElementById('messages-list').appendChild(div);
            document.getElementById('messages-list').scrollTop = document.getElementById('messages-list').scrollHeight;
        }

        function sendMessage() {
            if (!socket) return;
            const text = document.getElementById('message-input').value.trim();
            const file = document.getElementById('image-input').files[0];

            if (!text && !file) return;

            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const base64 = e.target.result;
                    socket.emit('user_message', { message: text || null, image: base64 });
                    appendImage(base64, true);
                    document.getElementById('image-input').value = '';
                    document.getElementById('message-input').value = '';
                };
                reader.readAsDataURL(file);
                return;
            }

            socket.emit('user_message', { message: text });
            appendMessage(text, true);
            document.getElementById('message-input').value = '';
        }

        function sendQuickReply(text) {
            document.getElementById('quick-replies-wrap').style.display = 'none';
            document.getElementById('message-input').value = text;
            sendMessage();
        }

        function removeImagePreview() {
            document.getElementById('image-preview-wrap').style.display = 'none';
            document.getElementById('image-input').value = '';
        }

        document.getElementById('startBtn').addEventListener('click', startCustomerChat);
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('image-input').addEventListener('change', () => {
            const file = document.getElementById('image-input').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('image-preview-wrap').style.display = 'block';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
